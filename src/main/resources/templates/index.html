<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{fragments/layout :: layout(titulo='Inicio', content=~{:: #pagina})}">
<body>
<div id="pagina">
    <div class="hero-section text-center mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-3" style="opacity:0.8">
                    <path d="M12 20h9"></path>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                </svg>
                <h1 class="display-5 fw-bold mb-3">ExamenFinal</h1>
                <p class="lead mb-4 mx-auto" style="max-width:540px">
                    Plataforma profesional para la gestión de preguntas de exámenes tipo test.
                    Crea, organiza y administra tu banco de preguntas de forma sencilla.
                </p>
                <div class="d-flex gap-3 justify-content-center flex-wrap">
                    <a class="btn btn-accent btn-lg px-4" th:href="@{/preguntas}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        Explorar Preguntas
                    </a>
                    <a class="btn btn-emerald btn-lg px-4" th:href="@{/preguntas/nueva}">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Crear Pregunta
                    </a>
                </div>
            </div>
        </div>
    </div>
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card-modern stats-card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2 mx-auto d-block"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <div class="number">V / F</div>
                <div class="label">Verdadero / Falso</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-modern stats-card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2 mx-auto d-block"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                <div class="number">Única</div>
                <div class="label">Selección Única</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-modern stats-card">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2 mx-auto d-block"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <div class="number">Múltiple</div>
                <div class="label">Selección Múltiple</div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
