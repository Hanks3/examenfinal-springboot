<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{fragments/layout :: layout(titulo='Formulario de Pregunta', content=~{:: #pagina})}">
<head>
    <script>
        function actualizarCamposTipo() {
            const tipo = document.getElementById('tipo').value;
            document.getElementById('campos-vf').style.display = tipo === 'V_F' ? 'block' : 'none';
            document.getElementById('campos-seleccion-unica').style.display = tipo === 'SELECCION_UNICA' ? 'block' : 'none';
            document.getElementById('campos-seleccion-multiple').style.display = tipo === 'SELECCION_MULTIPLE' ? 'block' : 'none';
        }
        function prepararListas() {
            ['opciones-unica', 'opciones-multiple', 'respuestas-multiple'].forEach(id => {
                const ta = document.getElementById(id);
                const container = document.getElementById(id + '-hidden');
                if (!ta) return;
                container.innerHTML = '';
                ta.value.split('\n').filter(l => l.trim()).forEach((line, i) => {
                    const inp = document.createElement('input');
                    inp.type = 'hidden';
                    inp.name = id === 'opciones-unica' || id === 'opciones-multiple' ? 'opciones' : 'respuestasCorrectas';
                    inp.value = line.trim();
                    container.appendChild(inp);
                });
            });
        }
    </script>
</head>
<body>
<div id="pagina">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card-modern">
                <div class="card-header-modern">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-accent-light rounded-3 p-2" style="background:var(--accent-light);">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </div>
                        <div>
                            <h1 class="h4 fw-bold mb-0" th:text="${preguntaDTO.id == null} ? 'Nueva Pregunta' : 'Editar Pregunta'">
                                Formulario
                            </h1>
                            <p class="small text-muted mb-0" th:text="${preguntaDTO.id == null} ? 'Completa los campos para registrar una nueva pregunta.' : 'Modifica los campos que desees actualizar.'">
                                Instrucciones
                            </p>
                        </div>
                    </div>
                </div>
                <div class="card-body-modern">
                    <form th:action="${preguntaDTO.id == null} ? @{/preguntas} : @{/preguntas/actualizar/{id}(id=${preguntaDTO.id})}"
                          th:object="${preguntaDTO}" method="post" class="needs-validation"
                          onsubmit="prepararListas()">

                        <div class="mb-4">
                            <label for="enunciado" class="form-label fw-semibold small text-muted">Enunciado</label>
                            <textarea id="enunciado" class="form-control form-control-modern" th:field="*{enunciado}" rows="4" placeholder="Escribe el enunciado de la pregunta..."
                                      th:classappend="${#fields.hasErrors('enunciado')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('enunciado')}" th:errors="*{enunciado}"></div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="tipo" class="form-label fw-semibold small text-muted">Tipo de pregunta</label>
                                <select id="tipo" class="form-select form-control-modern" th:field="*{tipo}"
                                        th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'"
                                        onchange="actualizarCamposTipo()">
                                    <option value="">Seleccione un tipo</option>
                                    <option value="V_F">Verdadero / Falso</option>
                                    <option value="SELECCION_UNICA">Selección Única</option>
                                    <option value="SELECCION_MULTIPLE">Selección Múltiple</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="tematicaId" class="form-label fw-semibold small text-muted">Temática</label>
                                <select id="tematicaId" class="form-select form-control-modern" th:field="*{tematicaId}"
                                        th:classappend="${#fields.hasErrors('tematicaId')} ? 'is-invalid'">
                                    <option value="">Seleccione una temática</option>
                                    <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tematicaId')}" th:errors="*{tematicaId}"></div>
                            </div>
                        </div>

                        <div id="campos-vf" style="display:none" class="mb-4 p-3 rounded-3" style="background:var(--bg-card);border:1px solid var(--border);">
                            <label class="form-label fw-semibold small text-muted">Opción correcta</label>
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="opcionCorrecta" th:field="*{opcionCorrecta}">
                                <label class="form-check-label" for="opcionCorrecta">Verdadero</label>
                            </div>
                        </div>

                        <div id="campos-seleccion-unica" style="display:none" class="mb-4 p-3 rounded-3" style="background:var(--bg-card);border:1px solid var(--border);">
                            <label for="opciones-unica" class="form-label fw-semibold small text-muted">Opciones (una por línea)</label>
                            <textarea id="opciones-unica" class="form-control form-control-modern" rows="4"
                                      placeholder="Madrid&#10;Paris&#10;Londres&#10;Berlin"
                                      th:text="${#lists.isEmpty(preguntaDTO.opciones)} ? '' : #strings.listJoin(preguntaDTO.opciones, T(java.lang.System).lineSeparator())"></textarea>
                            <div class="mt-3">
                                <label for="respuestaCorrecta" class="form-label fw-semibold small text-muted">Respuesta correcta</label>
                                <input type="text" id="respuestaCorrecta" class="form-control form-control-modern" th:field="*{respuestaCorrecta}" placeholder="Ej: Paris">
                            </div>
                            <div id="opciones-unica-hidden"></div>
                        </div>

                        <div id="campos-seleccion-multiple" style="display:none" class="mb-4 p-3 rounded-3" style="background:var(--bg-card);border:1px solid var(--border);">
                            <label for="opciones-multiple" class="form-label fw-semibold small text-muted">Opciones (una por línea)</label>
                            <textarea id="opciones-multiple" class="form-control form-control-modern" rows="4"
                                      placeholder="Opcion 1&#10;Opcion 2&#10;Opcion 3"
                                      th:text="${#lists.isEmpty(preguntaDTO.opciones)} ? '' : #strings.listJoin(preguntaDTO.opciones, T(java.lang.System).lineSeparator())"></textarea>
                            <div class="mt-3">
                                <label for="respuestas-multiple" class="form-label fw-semibold small text-muted">Respuestas correctas (una por línea)</label>
                                <textarea id="respuestas-multiple" class="form-control form-control-modern" rows="3"
                                          placeholder="Opcion 1&#10;Opcion 3"
                                          th:text="${#lists.isEmpty(preguntaDTO.respuestasCorrectas)} ? '' : #strings.listJoin(preguntaDTO.respuestasCorrectas, T(java.lang.System).lineSeparator())"></textarea>
                            </div>
                            <div id="opciones-multiple-hidden"></div>
                            <div id="respuestas-multiple-hidden"></div>
                        </div>

                        <hr class="my-4" style="border-color:var(--border)"/>
                        <div class="d-flex gap-3 justify-content-end">
                            <a class="btn btn-ghost px-4" th:href="@{/preguntas}">Cancelar</a>
                            <button type="submit" class="btn btn-accent px-4"
                                    th:text="${preguntaDTO.id == null} ? 'Guardar Pregunta' : 'Actualizar Pregunta'">
                                Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>actualizarCamposTipo()</script>
</body>
</html>
