<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es"
      th:replace="~{fragments/layout :: layout(titulo='Formulario de Pregunta', content=~{:: #pagina})}">
<body>
<div id="pagina">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card-modern">
                <div class="card-header-modern">
                    <div class="d-flex align-items-center gap-3">
                        <div class="bg-accent-light rounded-3 p-2" style="background:var(--accent-light);">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </div>
                        <div>
                            <h1 class="h4 fw-bold mb-0" th:text="${preguntaDTO.id == null} ? 'Nueva Pregunta' : 'Editar Pregunta'">
                                Formulario
                            </h1>
                            <p class="small text-muted mb-0" th:text="${preguntaDTO.id == null} ? 'Completa los campos para registrar una nueva pregunta.' : 'Modifica los campos que desees actualizar.'">
                                Instrucciones
                            </p>
                        </div>
                    </div>
                </div>
                <div class="card-body-modern">
                    <form th:action="${preguntaDTO.id == null} ? @{/preguntas} : @{/preguntas/actualizar/{id}(id=${preguntaDTO.id})}"
                          th:object="${preguntaDTO}" method="post" class="needs-validation">

                        <div class="mb-4">
                            <label for="enunciado" class="form-label fw-semibold small text-muted">Enunciado</label>
                            <textarea id="enunciado" class="form-control form-control-modern" th:field="*{enunciado}" rows="4" placeholder="Escribe el enunciado de la pregunta..."
                                      th:classappend="${#fields.hasErrors('enunciado')} ? 'is-invalid'"></textarea>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('enunciado')}" th:errors="*{enunciado}"></div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="tipo" class="form-label fw-semibold small text-muted">Tipo de pregunta</label>
                                <select id="tipo" class="form-select form-control-modern" th:field="*{tipo}"
                                        th:classappend="${#fields.hasErrors('tipo')} ? 'is-invalid'">
                                    <option value="">Seleccione un tipo</option>
                                    <option value="V_F">Verdadero / Falso</option>
                                    <option value="SELECCION_UNICA">Selección Única</option>
                                    <option value="SELECCION_MULTIPLE">Selección Múltiple</option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="tematicaId" class="form-label fw-semibold small text-muted">Temática</label>
                                <select id="tematicaId" class="form-select form-control-modern" th:field="*{tematicaId}"
                                        th:classappend="${#fields.hasErrors('tematicaId')} ? 'is-invalid'">
                                    <option value="">Seleccione una temática</option>
                                    <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('tematicaId')}" th:errors="*{tematicaId}"></div>
                            </div>
                        </div>

                        <hr class="my-4" style="border-color:var(--border)"/>
                        <div class="d-flex gap-3 justify-content-end">
                            <a class="btn btn-ghost px-4" th:href="@{/preguntas}">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-accent px-4"
                                    th:text="${preguntaDTO.id == null} ? 'Guardar Pregunta' : 'Actualizar Pregunta'">
                                Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
