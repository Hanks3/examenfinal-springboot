<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      lang="es"
      th:replace="~{fragments/layout :: layout(titulo='Listado de Preguntas', content=~{:: #pagina})}">
<body>
<div id="pagina">
    <div th:if="${mensaje}" class="alert alert-modern alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <span th:text="${mensaje}">Mensaje</span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">Preguntas</h1>
            <p class="text-muted small mb-0" th:if="${pagina.totalElements > 0}">
                <span th:text="${pagina.totalElements}">0</span> preguntas en total
            </p>
        </div>
        <a class="btn btn-accent" th:href="@{/preguntas/nueva}" sec:authorize="hasRole('ADMIN')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva Pregunta
        </a>
    </div>

    <div class="filter-section mb-4">
        <form th:action="@{/preguntas}" method="get" class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label small fw-semibold text-muted mb-1">Temática</label>
                <select name="tematicaId" class="form-select form-control-modern">
                    <option value="">Todas las temáticas</option>
                    <option th:each="t : ${tematicas}" th:value="${t.id}" th:text="${t.nombre}"
                            th:selected="${tematicaId != null && tematicaId == t.id}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small fw-semibold text-muted mb-1">Tipo</label>
                <select name="tipo" class="form-select form-control-modern">
                    <option value="">Todos los tipos</option>
                    <option value="V_F" th:selected="${tipoFiltro == 'V_F'}">Verdadero / Falso</option>
                    <option value="SELECCION_UNICA" th:selected="${tipoFiltro == 'SELECCION_UNICA'}">Selección Única</option>
                    <option value="SELECCION_MULTIPLE" th:selected="${tipoFiltro == 'SELECCION_MULTIPLE'}">Selección Múltiple</option>
                </select>
            </div>
            <div class="col-md-3 d-flex gap-2">
                <button type="submit" class="btn btn-accent flex-fill">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Filtrar
                </button>
                <a class="btn btn-outline-accent" th:href="@{/preguntas}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </a>
            </div>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(preguntas)}" class="card-modern empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="mb-3" style="color:var(--text-muted)"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p class="h5 fw-semibold mb-1">No hay preguntas registradas</p>
        <p class="small text-muted mb-3">Comienza creando tu primera pregunta.</p>
        <a class="btn btn-accent" th:href="@{/preguntas/nueva}" sec:authorize="hasRole('ADMIN')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Crear Primera Pregunta
        </a>
    </div>

    <div th:if="${!#lists.isEmpty(preguntas)}" class="row g-3">
        <div class="col-12" th:each="p : ${preguntas}">
            <div class="card-modern">
                <div class="card-body-modern">
                    <div class="d-flex align-items-start justify-content-between gap-3">
                        <div class="flex-grow-1 min-w-0">
                            <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                                <span th:if="${p.tipo == 'V_F'}" class="badge-pill-soft badge-vf">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                                    Verdadero / Falso
                                </span>
                                <span th:if="${p.tipo == 'SELECCION_UNICA'}" class="badge-pill-soft badge-su">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><circle cx="12" cy="12" r="10"/></svg>
                                    Selección Única
                                </span>
                                <span th:if="${p.tipo == 'SELECCION_MULTIPLE'}" class="badge-pill-soft badge-sm">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                                    Selección Múltiple
                                </span>
                                <span class="badge-pill-soft" style="background-color:#f1f5f9;color:#475569;font-size:0.72rem;">
                                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="me-1"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                                    <span th:text="${p.tematicaNombre}">Matemáticas</span>
                                </span>
                                <span class="text-muted" style="font-size:0.72rem;font-weight:500;">
                                    ID #<span th:text="${p.id}">1</span>
                                </span>
                            </div>
                            <p class="mb-0 fw-medium" style="font-size:0.95rem;line-height:1.5;" th:text="${p.enunciado}">Enunciado</p>
                        </div>
                        <div class="d-flex gap-1 flex-shrink-0" sec:authorize="hasRole('ADMIN')">
                            <a class="action-icon btn-ghost" th:href="@{/preguntas/editar/{id}(id=${p.id})}" title="Editar">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </a>
                            <a class="action-icon btn-ghost btn-ghost-danger" th:href="@{/preguntas/eliminar/{id}(id=${p.id})}"
                               onclick="return confirm('¿Confirmar eliminación?')" title="Eliminar">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav th:if="${pagina.totalPages > 0}" class="mt-4">
        <ul class="pagination justify-content-center flex-wrap gap-1">
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link page-link-modern" th:href="@{/preguntas(page=0, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipoFiltro})}" title="Primera">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="11 17 6 12 11 5"/><polyline points="18 17 13 12 18 5"/></svg>
                </a>
            </li>
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link page-link-modern" th:href="@{/preguntas(page=${pagina.number - 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipoFiltro})}" title="Anterior">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">
                <a class="page-link page-link-modern" th:href="@{/preguntas(page=${i}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipoFiltro})}" th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link page-link-modern" th:href="@{/preguntas(page=${pagina.number + 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipoFiltro})}" title="Siguiente">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </a>
            </li>
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link page-link-modern" th:href="@{/preguntas(page=${pagina.totalPages - 1}, size=${pagina.size}, tematicaId=${tematicaId}, tipo=${tipoFiltro})}" title="Última">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 5"/><polyline points="6 17 11 12 6 5"/></svg>
                </a>
            </li>
        </ul>
        <p class="text-center text-muted small mb-0">
            Página <span th:text="${pagina.number + 1}">1</span> de <span th:text="${pagina.totalPages}">1</span>
            &middot; <span th:text="${pagina.totalElements}">0</span> preguntas
        </p>
    </nav>
</div>
</body>
</html>
